<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLI Obfuscator</title>
<style>
  :root {
    --bg: #0d0b12;
    --surface: #13101c;
    --card: #17141f;
    --border: #2e2a40;
    --accent: #a78bfa;
    --accent2: #c4b5fd;
    --warn: #fbbf24;
    --err: #f87171;
    --text: #d1cce8;
    --muted: #6b6585;
    --font-mono: 'Courier New', Courier, monospace;
    --font-ui: 'Courier New', Courier, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: var(--font-ui);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px 60px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 0%, #1a1030 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, #120d28 0%, transparent 60%);
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 10px;
    animation: fadeDown 0.6s ease both;
  }
  .header h1 {
    font-size: 2.8em;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(167,139,250,0.5), 0 0 60px rgba(167,139,250,0.2);
  }
  .header h1 span { color: var(--accent2); }
  .header p {
    color: var(--muted);
    font-size: 0.9em;
    margin-top: 6px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* Warning banner */
  .banner {
    background: #1a1200;
    border: 1px solid var(--warn);
    border-left: 4px solid var(--warn);
    border-radius: 8px;
    padding: 12px 18px;
    color: var(--warn);
    font-size: 0.88em;
    font-family: var(--font-mono);
    animation: fadeDown 0.7s ease both;
    line-height: 1.7;
  }
  .banner strong { color: #ffe066; }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    animation: fadeUp 0.7s ease both;
  }
  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 2em; }
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card:hover {
    border-color: rgba(167,139,250,0.3);
    box-shadow: 0 0 30px rgba(167,139,250,0.06);
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .card.full { grid-column: 1 / -1; }

  .card-title {
    font-size: 0.75em;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-family: var(--font-mono);
  }

  /* Textarea */
  textarea {
    width: 100%;
    height: 200px;
    background: #100e18;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #c4b5fd;
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 0.85em;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(167,139,250,0.15);
  }
  textarea::placeholder { color: #2e2a40; }
  textarea[readonly] { color: #9580cc; cursor: default; }

  /* Options */
  .options { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }

  .opt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    color: var(--muted);
    font-size: 0.88em;
    transition: color 0.2s;
  }
  .toggle:hover { color: var(--text); }
  .toggle input { display: none; }
  .toggle-track {
    width: 34px; height: 18px;
    background: #1e1a2e;
    border: 1px solid #2e2a40;
    border-radius: 100px;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #3a3050;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked ~ .toggle-track {
    background: #2d1f5e;
    border-color: var(--accent);
  }
  .toggle input:checked ~ .toggle-track::after {
    transform: translateX(16px);
    background: var(--accent);
    box-shadow: 0 0 6px rgba(167,139,250,0.6);
  }

  /* Buttons */
  .btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 0.95em;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, #5b21b6, #7c3aed);
    color: #f3f0ff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    box-shadow: 0 4px 30px rgba(167,139,250,0.4);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: #1e1a2e;
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .btn-secondary {
    background: #13101c;
    color: var(--accent2);
    border: 1px solid #2e2a40;
    box-shadow: none;
  }
  .btn-secondary:hover {
    background: #1a1628;
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(167,139,250,0.15);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease both;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.82em;
    font-weight: 600;
    flex: 1;
    min-width: 160px;
    border: 1px solid transparent;
    transition: all 0.3s;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pill-idle    { background: #13101c; border-color: #2e2a40; color: #6b6585; }
  .pill-idle .status-dot    { background: #3a3050; }
  .pill-process { background: #1a1030; border-color: var(--accent); color: var(--accent); }
  .pill-process .status-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 1s infinite; }
  .pill-done    { background: #1a1535; border-color: #7c3aed; color: #c4b5fd; }
  .pill-done .status-dot    { background: #a78bfa; }
  .pill-error   { background: #1a0f0f; border-color: var(--err); color: var(--err); }
  .pill-error .status-dot   { background: var(--err); }

  .layers-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #13101c;
    border: 1px solid #2e2a40;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.82em;
    color: var(--muted);
    white-space: nowrap;
  }
  .layers-badge span { color: var(--accent); font-weight: 700; font-size: 1.1em; }

  /* Discord */
  .discord-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 11px 22px;
    background: #5865f2;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9em;
    transition: all 0.2s;
    border: 1px solid #7289da;
  }
  .discord-btn:hover {
    background: #7289da;
    box-shadow: 0 4px 20px rgba(88,101,242,0.4);
    transform: translateY(-1px);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    width: 10px; height: 10px;
    border: 2px solid rgba(167,139,250,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>

//  HELPERS
// ═══════════════════════════════════════════════════════
function randVar(n) {
  n = n || 7;
  var chars = 'abcdefghijklmnopqrstuvwxyz';
  var s = '_';
  for (var i = 0; i < n; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function simpleHash(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++)
    h = (Math.imul(h, 31) + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function looksLikeLua(code) {
  return /(?:local|function|end|if|then|for|while|return|print|require)/.test(code);
}

function setStatus(msg, type) {
  var pill = document.getElementById('statusPill');
  var text = document.getElementById('statusText');
  pill.className = 'status-pill pill-' + type;
  if (type === 'process') {
    pill.innerHTML = '<div class="spinner"></div><span>' + msg + '</span>';
  } else {
    pill.innerHTML = '<div class="status-dot"></div><span>' + msg + '</span>';
  }
}

function setLayers(n) {
  document.getElementById('layerCount').textContent = n;
}

  var out = '"';
  for (var i = 0; i < str.length; i++) {
    out += '\\' + str.charCodeAt(i);
  }
  out += '"';
  return out;
}

      .replace(/\\n/g,'\n').replace(/\\t/g,'\t')
      .replace(/\\r/g,'\r').replace(/\\\\/g,'\\').replace(/\\"/g,'"');
    if (!decoded) return '""';
    var bytes = [];
    for (var i = 0; i < decoded.length; i++) bytes.push(decoded.charCodeAt(i) & 0xFF);
    return 'string.char(' + bytes.join(',') + ')';
  });

  });

}

// Obfuscate numbers
function obfNums(code) {
  return code.replace(/(?<![.\w])(\b\d+\b)(?![.\w])/g, function(match, num) {
    var n = parseInt(num);
    if (isNaN(n) || n > 9999 || n < 0) return match;
    var junk = Math.floor(Math.random() * 500) + 1;
    return '(' + (n + junk) + '-' + junk + ')';
  });
}

// ═══════════════════════════════════════════════════════
//  BUILD OUTPUT - NO LOADSTRING, DIRECT LUA
// ═══════════════════════════════════════════════════════
function buildOutput(code) {
  // Step 1: mangle
  var out = mangleNames(code);
  // Step 2: encode strings
  out = encodeStrings(out);
  // Step 3: obfuscate numbers
  out = obfNums(out);

  // Wrap in do...end block with junk vars for obfuscation
  var vA = randVar(6), vB = randVar(6), vC = randVar(6);
  var junkVal = Math.floor(Math.random() * 9999) + 1;
  var header = '-- Obfuscated by SOLI Obfuscator\n';
  header += 'local ' + vA + ' = ' + junkVal + '\n';
  header += 'local ' + vB + ' = ' + (junkVal * 2) + '\n';
  header += 'local ' + vC + ' = ' + vA + ' + ' + vB + '\n';
  header += 'do\n';

  // indent output
  var indented = out.split('\n').map(function(l){ return '  ' + l; }).join('\n');

  return header + indented + '\nend\n';
}

// ─────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────
function rv(n) {
  var c = '_'; var ch = 'abcdefghijklmnopqrstuvwxyz';
  for (var i = 0; i < (n||7); i++) c += ch[Math.floor(Math.random()*ch.length)];
  return c;
}
function encodeStr(s) {
  var b = [];
  for (var i = 0; i < s.length; i++) b.push(s.charCodeAt(i));
  return 'string.char(' + b.join(',') + ')';
}
function obfNum(n) {
  var j1 = Math.floor(Math.random()*50)+1;
  var j2 = Math.floor(Math.random()*50)+1;
  return '('+(n+j1+j2)+'-'+j1+'-'+j2+')';
}

// ─────────────────────────────────────────────────────
//  ANTI-TAMPER: EXECUTOR  (debug.getinfo + _G sentinel)
// ─────────────────────────────────────────────────────
function buildAntiTamper(code) {
  var vOk=rv(), vDbg=rv(), vInfo=rv(), vSrc=rv(), vR=rv();
  var lines = [
    'do',
    '  local '+vOk+' = true',
    '  local '+vDbg+' = debug',
    '  if '+vDbg+' and '+vDbg+'.getinfo then',
    '    local '+vInfo+' = '+vDbg+'.getinfo(1)',
    '    if '+vInfo+' then',
    '      local '+vSrc+' = tostring('+vInfo+'.source)',
    '      if '+vSrc+' == '+encodeStr('=[C]')+' or '+vSrc+' == '+encodeStr('')+' then',
    '        '+vOk+' = false',
    '      end',
    '    end',
    '  end',
    '  local '+vR+' = rawget',
    '  if '+vR+'(_G,'+encodeStr('_SOLI_RUN')+') then '+vOk+' = false end',
    '  if not '+vOk+' then error('+encodeStr('tamper detected')+',0) end',
    '  rawset(_G,'+encodeStr('_SOLI_RUN')+',true)',
    'end',
  ];
  return lines.join('\n') + '\n' + code;
}

// ─────────────────────────────────────────────────────
//  ANTI-TAMPER: LUA BIASA  (env integrity + hook check)
// ─────────────────────────────────────────────────────
function buildLuaAntiTamper(code) {
  var vTs=rv(), vTp=rv(), vRef=rv(), vChk=rv(), vVer=rv();
  // Cek: type(math)=="table", _VERSION mengandung "Lua",
  // tostring masih pointing ke C function (bukan hook)
  var lines = [
    'do',
    '  local '+vTs+' = tostring',
    '  local '+vTp+' = type',
    '  if '+vTp+'(math) ~= '+encodeStr('table')+' then',
    '    error('+encodeStr('SOLI: env corrupted')+',0)',
    '  end',
    '  local '+vVer+' = _VERSION or '+encodeStr(''),
    '  if not string.find('+vVer+','+encodeStr('Lua')+',1,true) then',
    '    error('+encodeStr('SOLI: invalid runtime')+',0)',
    '  end',
    '  local '+vRef+' = '+vTs+'(math.sin)',
    '  local '+vChk+' = '+vTs+'(math.sin)',
    '  if '+vRef+' ~= '+vChk+' then',
    '    error('+encodeStr('SOLI: hook detected')+',0)',
    '  end',
    '  if not string.find('+vRef+','+encodeStr('function')+',1,true) then',
    '    error('+encodeStr('SOLI: stdlib tampered')+',0)',
    '  end',
    'end',
  ];
  return lines.join('\n') + '\n' + code;
}

// ─────────────────────────────────────────────────────
//  VM LAYER  — closure-dispatch mini VM, no loadstring
// ─────────────────────────────────────────────────────
// Cara kerja:
//   1. Kode user dipotong per-statement jadi closure array  → disimpan di tabel K (kode)
//   2. Setiap closure punya nomor opcode EXEC di tabel bytecode B
//   3. Loop VM baca B[pc], decode opcode+index, panggil K[index]()
//   4. Semua angka di B di-obfuscate, nama var random
//   Hasilnya: logika eksekusi tersembunyi di balik dispatch loop
function buildVMLayer(code) {
  // Opcode IDs
  var OP_EXEC = 1;   // jalankan closure[idx]
  var OP_HALT = 2;   // selesai

  var vK   = rv();   // closure table
  var vB   = rv();   // bytecode table
  var vPc  = rv();   // program counter
  var vIns = rv();   // current instruction
  var vOpc = rv();   // opcode
  var vIdx = rv();   // operand index
  var vI   = rv(4);  // loop var

  // Potong statements
  var stmts = splitStatements(code).filter(function(s){ return s.trim(); });

  // Bangun tabel closure K
  var kLines = ['local ' + vK + ' = {'];
  for (var i = 0; i < stmts.length; i++) {
    // Setiap closure di-wrap supaya scope lokal terjaga
    kLines.push('  [' + (i+1) + '] = function()');
    // indent statement
    stmts[i].split('\n').forEach(function(l){ kLines.push('    ' + l); });
    kLines.push('  end,');
  }
  kLines.push('}');

  // Bangun bytecode B: {op, idx} per instruksi, semua angka di-obfNum
  var bLines = ['local ' + vB + ' = {'];
  for (var i = 0; i < stmts.length; i++) {
    bLines.push('  {' + obfNum(OP_EXEC) + ',' + obfNum(i+1) + '},');
  }
  bLines.push('  {' + obfNum(OP_HALT) + ',' + obfNum(0) + '},');
  bLines.push('}');

  // VM loop
  var OP_EXEC_LIT = obfNum(OP_EXEC);
  var vmLines = [
    'local ' + vPc + ' = ' + obfNum(1),
    'while ' + vPc + ' <= #' + vB + ' do',
    '  local ' + vIns + ' = ' + vB + '[' + vPc + ']',
    '  local ' + vOpc + ' = ' + vIns + '[' + obfNum(1) + ']',
    '  local ' + vIdx + ' = ' + vIns + '[' + obfNum(2) + ']',
    '  if ' + vOpc + ' == ' + OP_EXEC_LIT + ' then',
    '    ' + vK + '[' + vIdx + ']()',
    '  else',
    '    break',
    '  end',
    '  ' + vPc + ' = ' + vPc + ' + ' + obfNum(1),
    'end',
  ];

  // Junk header vars
  var jA = rv(), jB = rv();
  var header = '-- SOLI Obfuscator [VM Layer]\n'
             + 'local ' + jA + ' = ' + obfNum(Math.floor(Math.random()*999)+1) + '\n'
             + 'local ' + jB + ' = ' + jA + ' * ' + obfNum(2) + '\n';

  return header
       + kLines.join('\n') + '\n'
       + bLines.join('\n') + '\n'
       + vmLines.join('\n') + '\n';
}

// Split Lua code jadi statement-statement terpisah (blok-aware)
function splitStatements(code) {
  var lines = code.split('\n');
  var stmts = [], buf = [], depth = 0;
  var reOpen  = /^\s*(if|while|for|repeat|do)\b/;
  var reFn    = /^\s*(local\s+)?function\b/;
  var reEnd   = /^\s*end\b/;
  var reUntil = /^\s*until\b/;
  var reElse  = /^\s*(else|elseif)\b/;

  function flush() { if (buf.length) { stmts.push(buf.join('\n')); buf = []; } }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var s = line.trim();
    if (!s || s.startsWith('--')) { if (!depth) flush(); continue; }

    buf.push(line);

    if (reOpen.test(s) || reFn.test(s)) depth++;
    if ((reEnd.test(s) || reUntil.test(s)) && !reElse.test(s)) {
      depth--;
      if (depth <= 0) { depth = 0; flush(); }
    } else if (!depth) {
      flush();
    }
  }
  flush();
  return stmts;
}

// ═══════════════════════════════════════════════════════
//  AUTO LOWERCASE — skip isi string literal & komentar
// ═══════════════════════════════════════════════════════
function autoLowercase(code) {
  var result = '';
  var i = 0;
  while (i < code.length) {
    var ch = code[i];
    // Skip string double quote
    if (ch === '"') {
      result += ch; i++;
      while (i < code.length) {
        var c = code[i];
        result += c; i++;
        if (c === '\\') { if (i < code.length) { result += code[i]; i++; } }
        else if (c === '"') break;
      }
    }
    // Skip string single quote
    else if (ch === "'") {
      result += ch; i++;
      while (i < code.length) {
        var c = code[i];
        result += c; i++;
        if (c === '\\') { if (i < code.length) { result += code[i]; i++; } }
        else if (c === "'") break;
      }
    }
    // Skip long string [[...]]
    else if (ch === '[' && code[i+1] === '[') {
      result += '[['; i += 2;
      while (i < code.length) {
        if (code[i] === ']' && code[i+1] === ']') { result += ']]'; i += 2; break; }
        result += code[i]; i++;
      }
    }
    // Skip line comment --
    else if (ch === '-' && code[i+1] === '-') {
      while (i < code.length && code[i] !== '\n') { result += code[i]; i++; }
    }
    // Normal code — lowercase
    else {
      result += ch.toLowerCase(); i++;
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════
//  MAIN OBFUSCATE
// ═══════════════════════════════════════════════════════
async function doObf() {
  var inputEl  = document.getElementById('input');
  var outputEl = document.getElementById('output');
  var btn      = document.getElementById('obfBtn');
  var useAntiTamper    = document.getElementById('useAntiTamper').checked;
  var useLuaAntiTamper = document.getElementById('useLuaAntiTamper').checked;
  var useVM            = document.getElementById('useVM').checked;

  var code = inputEl.value.trim();
  var layers = 0;

  btn.disabled = true;
  outputEl.value = '';
  setStatus('Processing...', 'process');
  setLayers(0);

  await new Promise(r => setTimeout(r, 400));

  if (!code) {
    setStatus('Input kosong! Paste kode Lua dulu.', 'error');
    btn.disabled = false; return;
  }
  // Auto lowercase: jaga string literals tetap, lowercase identifier aja
  code = autoLowercase(code);
  inputEl.value = code;
  if (!looksLikeLua(code)) {
    setStatus('Kode tidak terdeteksi sebagai Lua. Cek input kamu.', 'error');
    btn.disabled = false; return;
  }

  try {
    var block;
    var layers = 3; // mangle + encodeStr + obfNums

    if (useVM) {
      // VM path: obf dulu, lalu wrap pakai VM
      var obfed = mangleNames(code);
      obfed = encodeStrings(obfed);
      obfed = obfNums(obfed);
      block = buildVMLayer(obfed);
      layers += 1;
    } else {
      block = buildOutput(code);
    }

    // Anti-Tamper executor (debug.getinfo)
    if (useAntiTamper) {
      block = buildAntiTamper(block);
      layers += 1;
    }

    // Anti-Tamper Lua biasa (metatable/env check)
    if (useLuaAntiTamper) {
      block = buildLuaAntiTamper(block);
      layers += 1;
    }

    setLayers(layers);
    outputEl.value = block;
    setStatus('Selesai! ' + layers + ' layer', 'done');
    setLayers(layers);

  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
//  COPY
// ═══════════════════════════════════════════════════════
async function doCopy() {
  var out = document.getElementById('output').value;
  if (!out.trim()) { setStatus('Belum ada output untuk dicopy!', 'error'); return; }

  try {
    await navigator.clipboard.writeText(out);
  } catch(e) {
    var ta = document.createElement('textarea');
    ta.value = out;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  var btn = document.querySelector('.btn-secondary');
  var orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.style.color = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  setTimeout(function() {
    btn.textContent = orig;
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 1500);
  setStatus('Output berhasil dicopy ke clipboard!', 'done');
}
