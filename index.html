<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodet Obfuscator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080c10;color:#c9d1d9;font-family:'Share Tech Mono',monospace;min-height:100vh;padding:24px;}
h1{font-family:'Rajdhani',sans-serif;font-size:2rem;color:#00e5ff;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px;}
.sub{color:#3a5a7a;font-size:.8rem;margin-bottom:28px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:1200px;margin:0 auto;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
.panel{background:#0d1117;border:1px solid #1e2d3d;border-radius:10px;padding:16px;}
.panel label{display:block;color:#3a8fbf;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
textarea{width:100%;height:320px;background:#060a0e;border:1px solid #1e2d3d;border-radius:6px;color:#7ee787;font-family:'Share Tech Mono',monospace;font-size:.85rem;padding:12px;resize:vertical;outline:none;transition:border-color .2s;}
textarea:focus{border-color:#00e5ff44;}
textarea[readonly]{color:#8b949e;}
.options{display:flex;gap:20px;flex-wrap:wrap;margin:14px 0;}
.opt{display:flex;align-items:center;gap:8px;cursor:pointer;color:#8b949e;font-size:.85rem;user-select:none;}
.opt input{accent-color:#00e5ff;width:15px;height:15px;cursor:pointer;}
.opt:hover{color:#c9d1d9;}
.btn{width:100%;padding:12px;background:linear-gradient(90deg,#003d4d,#006680);border:1px solid #00e5ff44;border-radius:6px;color:#00e5ff;font-family:'Share Tech Mono',monospace;font-size:.9rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn:hover{background:linear-gradient(90deg,#005066,#008fa8);box-shadow:0 0 20px #00e5ff22;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-copy{background:linear-gradient(90deg,#1a3a1a,#1f5c1f);border-color:#7ee78744;color:#7ee787;margin-top:10px;}
.btn-copy:hover{background:linear-gradient(90deg,#1f4a1f,#2a7a2a);box-shadow:0 0 20px #7ee78722;}
.status{margin-top:14px;padding:10px 14px;border-radius:6px;font-size:.8rem;border:1px solid transparent;display:none;}
.status.ok{background:#0d2a0d;border-color:#238636;color:#7ee787;display:block;}
.status.err{background:#2a0d0d;border-color:#da3633;color:#f85149;display:block;}
.status.loading{background:#0d1a2a;border-color:#1158a7;color:#58a6ff;display:block;}
.header{max-width:1200px;margin:0 auto 24px;}
.hash{color:#3a5a7a;font-size:.75rem;margin-top:6px;}
</style>
</head>
<body>
<div class="header">
  <h1>⬡ Nodet Obfuscator</h1>
  <div class="sub">// Lua obfuscator with FiOne VM — Roblox compatible</div>
</div>
<div class="grid">
  <div class="panel">
    <label>// Input Lua Code</label>
    <textarea id="input" placeholder="-- Paste your Lua script here&#10;print('Hello, World!')"></textarea>
    <div class="options">
      <label class="opt"><input type="checkbox" id="useVM" checked> Enable VM Wrapper</label>
      <label class="opt"><input type="checkbox" id="useAT" checked> Enable Anti-Tamper</label>
    </div>
    <button class="btn" id="obfBtn" onclick="obfuscate()">[ Obfuscate ]</button>
    <div class="status" id="status"></div>
  </div>
  <div class="panel">
    <label>// Obfuscated Output</label>
    <textarea id="output" readonly placeholder="-- Obfuscated code will appear here..."></textarea>
    <div class="hash" id="hashDisplay"></div>
    <button class="btn btn-copy" id="copyBtn" onclick="copyOutput()">[ Copy Output ]</button>
  </div>
</div>
<script>
async function obfuscate() {
  const code = document.getElementById('input').value.trim();
  const useVM = document.getElementById('useVM').checked;
  const useAT = document.getElementById('useAT').checked;
  const btn = document.getElementById('obfBtn');
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  const hashDisplay = document.getElementById('hashDisplay');
  if (!code) { showStatus('Input is empty!', 'err'); return; }
  btn.disabled = true;
  showStatus('// Obfuscating...', 'loading');
  output.value = '';
  hashDisplay.textContent = '';
  try {
    const res = await fetch('/obfuscate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, useVM, useAT })
    });
    const data = await res.json();
    if (data.error) { showStatus('Error: ' + data.error, 'err'); return; }
    output.value = data.result;
    const hashMatch = data.result.match(/VM-Hash: ([a-f0-9]+)/);
    if (hashMatch) hashDisplay.textContent = '// VM-Hash: ' + hashMatch[1];
    showStatus('// Obfuscation complete! ' + data.result.length + ' bytes', 'ok');
  } catch(e) {
    showStatus('Connection error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}
async function copyOutput() {
  const val = document.getElementById('output').value;
  if (!val) { showStatus('Nothing to copy!', 'err'); return; }
  try {
    await navigator.clipboard.writeText(val);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '[ Copied! ]';
    setTimeout(() => btn.textContent = '[ Copy Output ]', 1500);
  } catch { showStatus('Copy failed, please copy manually.', 'err'); }
}
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}
document.getElementById('input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') obfuscate();
});
</script>
</body>
</html>
