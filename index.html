<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLI Obfuscator</title>
<style>
  :root {
    --bg:#0d0b12; --surface:#13101c; --card:#17141f; --border:#2e2a40;
    --accent:#a78bfa; --accent2:#c4b5fd; --warn:#fbbf24; --err:#f87171;
    --text:#d1cce8; --muted:#6b6585;
    --font-mono:'Courier New',Courier,monospace;
    --font-ui:'Courier New',Courier,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:var(--font-ui);color:var(--text);min-height:100vh;padding:30px 20px 60px;background-image:radial-gradient(ellipse 80% 50% at 20% 0%,#1a1030 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#120d28 0%,transparent 60%);}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:999;}
  .wrapper{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
  .header{text-align:center;padding:20px 0 10px;animation:fadeDown 0.6s ease both;}
  .header h1{font-size:2.8em;font-weight:800;letter-spacing:0.12em;color:var(--accent);text-shadow:0 0 30px rgba(167,139,250,0.5),0 0 60px rgba(167,139,250,0.2);}
  .header h1 span{color:var(--accent2);}
  .header p{color:var(--muted);font-size:0.9em;margin-top:6px;font-family:var(--font-mono);letter-spacing:0.05em;}
  .banner{background:#1a1200;border:1px solid var(--warn);border-left:4px solid var(--warn);border-radius:8px;padding:12px 18px;color:var(--warn);font-size:0.88em;font-family:var(--font-mono);animation:fadeDown 0.7s ease both;line-height:1.7;}
  .banner strong{color:#ffe066;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;animation:fadeUp 0.7s ease both;}
  @media(max-width:680px){.grid{grid-template-columns:1fr;}.header h1{font-size:2em;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;position:relative;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
  .card:hover{border-color:rgba(167,139,250,0.3);box-shadow:0 0 30px rgba(167,139,250,0.06);}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.4;}
  .card.full{grid-column:1/-1;}
  .card-title{font-size:0.75em;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;font-family:var(--font-mono);}
  textarea{width:100%;height:200px;background:#100e18;border:1px solid var(--border);border-radius:8px;color:#c4b5fd;padding:12px;font-family:var(--font-mono);font-size:0.85em;resize:vertical;transition:border-color 0.2s,box-shadow 0.2s;line-height:1.6;}
  textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(167,139,250,0.15);}
  textarea::placeholder{color:#2e2a40;}
  textarea[readonly]{color:#9580cc;cursor:default;}
  .options{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
  .opt-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;color:var(--muted);font-size:0.88em;transition:color 0.2s;}
  .toggle:hover{color:var(--text);}
  .toggle input{display:none;}
  .toggle-track{width:34px;height:18px;background:#1e1a2e;border:1px solid #2e2a40;border-radius:100px;position:relative;transition:background 0.2s,border-color 0.2s;flex-shrink:0;}
  .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#3a3050;border-radius:50%;transition:transform 0.2s,background 0.2s;}
  .toggle input:checked~.toggle-track{background:#2d1f5e;border-color:var(--accent);}
  .toggle input:checked~.toggle-track::after{transform:translateX(16px);background:var(--accent);box-shadow:0 0 6px rgba(167,139,250,0.6);}
  .btn{width:100%;margin-top:16px;padding:13px;border:none;border-radius:8px;font-family:var(--font-ui);font-weight:700;font-size:0.95em;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn-primary{background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#f3f0ff;box-shadow:0 4px 20px rgba(124,58,237,0.3);}
  .btn-primary:hover{background:linear-gradient(135deg,#7c3aed,#a78bfa);box-shadow:0 4px 30px rgba(167,139,250,0.4);transform:translateY(-1px);}
  .btn-primary:disabled{background:#1e1a2e;color:var(--muted);cursor:not-allowed;box-shadow:none;transform:none;}
  .btn-secondary{background:#13101c;color:var(--accent2);border:1px solid #2e2a40;}
  .btn-secondary:hover{background:#1a1628;border-color:var(--accent);box-shadow:0 0 15px rgba(167,139,250,0.15);}
  .status-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;animation:fadeUp 0.8s ease both;}
  .status-pill{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:100px;font-family:var(--font-mono);font-size:0.82em;font-weight:600;flex:1;min-width:160px;border:1px solid transparent;transition:all 0.3s;}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .pill-idle{background:#13101c;border-color:#2e2a40;color:#6b6585;}
  .pill-idle .status-dot{background:#3a3050;}
  .pill-process{background:#1a1030;border-color:var(--accent);color:var(--accent);}
  .pill-process .status-dot{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 1s infinite;}
  .pill-done{background:#1a1535;border-color:#7c3aed;color:#c4b5fd;}
  .pill-done .status-dot{background:#a78bfa;}
  .pill-error{background:#1a0f0f;border-color:var(--err);color:var(--err);}
  .pill-error .status-dot{background:var(--err);}
  .layers-badge{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#13101c;border:1px solid #2e2a40;border-radius:100px;font-family:var(--font-mono);font-size:0.82em;color:var(--muted);white-space:nowrap;}
  .layers-badge span{color:var(--accent);font-weight:700;font-size:1.1em;}
  .discord-btn{display:inline-flex;align-items:center;gap:10px;padding:11px 22px;background:#5865f2;color:white;text-decoration:none;border-radius:8px;font-weight:700;font-size:0.9em;transition:all 0.2s;border:1px solid #7289da;}
  .discord-btn:hover{background:#7289da;box-shadow:0 4px 20px rgba(88,101,242,0.4);transform:translateY(-1px);}
  .spinner{width:10px;height:10px;border:2px solid rgba(167,139,250,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>SOLI <span>Obfuscator</span></h1>
    <p>// lua obfuscator //</p>
  </div>
  <div class="banner">
    <strong>⚠ ALPHA:</strong> Web ini masih dalam tahap Alpha. Harap maklum jika ada bug.
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-title">▸ Input Lua Code</div>
      <textarea id="input" placeholder="-- Paste kode Lua kamu di sini&#10;print('Hello, World!')" style="min-height:200px;height:auto;resize:vertical;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <div class="options">
        <div class="opt-row">
          <label class="toggle">
            <input type="checkbox" id="useAntiTamper" onchange="if(this.checked)document.getElementById('useLuaAntiTamper').checked=false">
            <span class="toggle-track"></span>
            Anti-Tamper Executor
          </label>
        </div>
        <div class="opt-row">
          <label class="toggle">
            <input type="checkbox" id="useLuaAntiTamper" onchange="if(this.checked)document.getElementById('useAntiTamper').checked=false">
            <span class="toggle-track"></span>
            Anti-Tamper Lua 5.1
          </label>
        </div>
      </div>
      <button class="btn btn-primary" id="obfBtn" onclick="doObf()">Obfuscate</button>
    </div>
    <div class="card">
      <div class="card-title">▸ Obfuscated Output</div>
      <textarea id="output" readonly placeholder="-- Output akan muncul di sini..."></textarea>
      <button id="copyBtn" onclick="doCopy()" style="margin-top:10px;width:100%;padding:12px;background:linear-gradient(90deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.5px;">📋 Copy Output</button>
    </div>
    <div class="card full" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div>
        <div class="card-title">▸ Community</div>
        <p style="font-size:0.88em;color:var(--muted);">Nemu bug? Kasih tau kami di Discord!</p>
      </div>
      <a href="https://discord.gg/AZdP3xmKwQ" target="_blank" class="discord-btn">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M15.245 1.175A14.9 14.9 0 0 0 11.573 0c-.17.303-.37.71-.506 1.034a13.79 13.79 0 0 0-4.134 0A11.3 11.3 0 0 0 6.425 0 14.94 14.94 0 0 0 2.75 1.178C.396 4.757-.243 8.246.077 11.685c1.545 1.14 3.044 1.834 4.517 2.288.364-.497.688-1.026.966-1.585a9.72 9.72 0 0 1-1.52-.736c.127-.094.252-.19.373-.29 2.927 1.36 6.102 1.36 8.994 0 .122.1.247.196.373.29-.484.288-.995.534-1.521.737.278.56.601 1.09.965 1.585 1.474-.454 2.975-1.148 4.52-2.29.374-3.98-.64-7.437-2.499-10.51ZM6.008 9.573c-.89 0-1.624-.826-1.624-1.837 0-1.01.718-1.838 1.624-1.838.907 0 1.64.827 1.624 1.838 0 1.01-.717 1.837-1.624 1.837Zm5.984 0c-.89 0-1.624-.826-1.624-1.837 0-1.01.718-1.838 1.624-1.838.907 0 1.64.827 1.624 1.838 0 1.01-.71 1.837-1.624 1.837Z" fill="white"/></svg>
        Join Discord
      </a>
    </div>
  </div>
</div>

<script src="test.js"></script>
</body>
</html>
