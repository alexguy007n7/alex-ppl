<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLI Obfuscator</title>
<style>
  :root {
    --bg: #0d0b12;
    --surface: #13101c;
    --card: #17141f;
    --border: #2e2a40;
    --accent: #a78bfa;
    --accent2: #c4b5fd;
    --warn: #fbbf24;
    --err: #f87171;
    --text: #d1cce8;
    --muted: #6b6585;
    --font-mono: 'Courier New', Courier, monospace;
    --font-ui: 'Courier New', Courier, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: var(--font-ui);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px 60px;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 0%, #1a1030 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, #120d28 0%, transparent 60%);
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 10px;
    animation: fadeDown 0.6s ease both;
  }
  .header h1 {
    font-size: 2.8em;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(167,139,250,0.5), 0 0 60px rgba(167,139,250,0.2);
  }
  .header h1 span { color: var(--accent2); }
  .header p {
    color: var(--muted);
    font-size: 0.9em;
    margin-top: 6px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* Warning banner */
  .banner {
    background: #1a1200;
    border: 1px solid var(--warn);
    border-left: 4px solid var(--warn);
    border-radius: 8px;
    padding: 12px 18px;
    color: var(--warn);
    font-size: 0.88em;
    font-family: var(--font-mono);
    animation: fadeDown 0.7s ease both;
    line-height: 1.7;
  }
  .banner strong { color: #ffe066; }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    animation: fadeUp 0.7s ease both;
  }
  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 2em; }
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card:hover {
    border-color: rgba(167,139,250,0.3);
    box-shadow: 0 0 30px rgba(167,139,250,0.06);
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .card.full { grid-column: 1 / -1; }

  .card-title {
    font-size: 0.75em;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    font-family: var(--font-mono);
  }

  /* Textarea */
  textarea {
    width: 100%;
    height: 200px;
    background: #100e18;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #c4b5fd;
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 0.85em;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(167,139,250,0.15);
  }
  textarea::placeholder { color: #2e2a40; }
  textarea[readonly] { color: #9580cc; cursor: default; }

  /* Options */
  .options { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }

  .opt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    color: var(--muted);
    font-size: 0.88em;
    transition: color 0.2s;
  }
  .toggle:hover { color: var(--text); }
  .toggle input { display: none; }
  .toggle-track {
    width: 34px; height: 18px;
    background: #1e1a2e;
    border: 1px solid #2e2a40;
    border-radius: 100px;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #3a3050;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked ~ .toggle-track {
    background: #2d1f5e;
    border-color: var(--accent);
  }
  .toggle input:checked ~ .toggle-track::after {
    transform: translateX(16px);
    background: var(--accent);
    box-shadow: 0 0 6px rgba(167,139,250,0.6);
  }

  /* Buttons */
  .btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 0.95em;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, #5b21b6, #7c3aed);
    color: #f3f0ff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    box-shadow: 0 4px 30px rgba(167,139,250,0.4);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: #1e1a2e;
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  .btn-secondary {
    background: #13101c;
    color: var(--accent2);
    border: 1px solid #2e2a40;
    box-shadow: none;
  }
  .btn-secondary:hover {
    background: #1a1628;
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(167,139,250,0.15);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease both;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.82em;
    font-weight: 600;
    flex: 1;
    min-width: 160px;
    border: 1px solid transparent;
    transition: all 0.3s;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pill-idle    { background: #13101c; border-color: #2e2a40; color: #6b6585; }
  .pill-idle .status-dot    { background: #3a3050; }
  .pill-process { background: #1a1030; border-color: var(--accent); color: var(--accent); }
  .pill-process .status-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 1s infinite; }
  .pill-done    { background: #1a1535; border-color: #7c3aed; color: #c4b5fd; }
  .pill-done .status-dot    { background: #a78bfa; }
  .pill-error   { background: #1a0f0f; border-color: var(--err); color: var(--err); }
  .pill-error .status-dot   { background: var(--err); }

  .layers-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #13101c;
    border: 1px solid #2e2a40;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.82em;
    color: var(--muted);
    white-space: nowrap;
  }
  .layers-badge span { color: var(--accent); font-weight: 700; font-size: 1.1em; }

  /* Discord */
  .discord-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 11px 22px;
    background: #5865f2;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9em;
    transition: all 0.2s;
    border: 1px solid #7289da;
  }
  .discord-btn:hover {
    background: #7289da;
    box-shadow: 0 4px 20px rgba(88,101,242,0.4);
    transform: translateY(-1px);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    width: 10px; height: 10px;
    border: 2px solid rgba(167,139,250,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <h1>SOLI <span>Obfuscator</span></h1>

  </div>

<script>
// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function randVar(n) {
  n = n || 7;
  var chars = 'abcdefghijklmnopqrstuvwxyz';
  var s = '_';
  for (var i = 0; i < n; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function simpleHash(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++)
    h = (Math.imul(h, 31) + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function looksLikeLua(code) {
  return /(?:local|function|end|if|then|for|while|return|print|require)/.test(code);
}

function setStatus(msg, type) {
  var pill = document.getElementById('statusPill');
  var text = document.getElementById('statusText');
  pill.className = 'status-pill pill-' + type;
  if (type === 'process') {
    pill.innerHTML = '<div class="spinner"></div><span>' + msg + '</span>';
  } else {
    pill.innerHTML = '<div class="status-dot"></div><span>' + msg + '</span>';
  }
}

function setLayers(n) {
  document.getElementById('layerCount').textContent = n;
}

// ═══════════════════════════════════════════════════════
//  OBFUSCATION ENGINE
// ═══════════════════════════════════════════════════════

// ── Shared helpers ─────────────────────────────────────
function rv(n) {
  var c = '_', ch = 'abcdefghijklmnopqrstuvwxyz';
  for (var i = 0; i < (n || 7); i++) c += ch[Math.floor(Math.random() * ch.length)];
  return c;
}
function obfNum(n) {
  var j1 = Math.floor(Math.random() * 50) + 1;
  var j2 = Math.floor(Math.random() * 50) + 1;
  return '(' + (n + j1 + j2) + '-' + j1 + '-' + j2 + ')';
}
function encodeStr(s) {
  var b = [];
  for (var i = 0; i < s.length; i++) b.push(s.charCodeAt(i));
  return 'string.char(' + b.join(',') + ')';
}

// ── 1. XOR Rolling Key string encoder ─────────────────
// Rolling key: key[i % keylen] — jauh lebih sulit bruteforce daripada Caesar
// Key adalah array N byte random (default 8), encode/decode simetris
function encodeStrings(code) {
  function doEncode(str) {
    if (!str) return '""';
    var slen = str.length;
    // Generate rolling key array (4-12 byte random)
    var keyLen = Math.floor(Math.random() * 9) + 4;
    var key = [];
    for (var k = 0; k < keyLen; k++)
      key.push(Math.floor(Math.random() * 223) + 32); // printable range supaya stable

    // XOR encode
    var enc = [];
    for (var i = 0; i < slen; i++)
      enc.push((str.charCodeAt(i) ^ key[i % keyLen]) & 0xFF);

    // Build Lua inline decoder (IIFE):
    // (function()
    //   local K={k1,k2,...}
    //   local E={e1,e2,...}
    //   local R={}
    //   for i=1,#E do R[i]=string.char((E[i]~K[((i-1)%#K)+1])%256) end -- pure arithmetic XOR
    //   return table.concat(R)
    // end)()
    // XOR via arithmetic (works Lua 5.1-5.4 without bit lib):
    //   a XOR b where both 0-255:
    //   each bit: use the fact that (a+b)%2 = a XOR b for single bit
    //   Full byte XOR via lookup table approach or pure math.
    //   Simplest portable: precompute the decoded bytes directly but obscure the key.
    //   We'll use: decoded[i] = enc[i] + key[i] - 2*(enc[i] AND key[i])  <-- hard
    //   Actually the SIMPLEST portable Lua XOR for 0-255 values:
    //     xor(a,b) = (a+b) % 256  -- NOT XOR, that's add
    //   Real portable XOR in Lua 5.1: bit.bxor or a loop over bits.
    //   Since we target Roblox (bit32 available) and modern Lua (5.3 has ~):
    //   We use arithmetic trick that works: store (enc + 256) - key shifted
    //   OR: just pre-decode and store as string.char bytes (no runtime XOR needed)
    //   BUT that defeats obfuscation. 
    //   BEST APPROACH: use runtime decode with a helper that works on all:
    //     local function xb(a,b) -- xor bytes
    //       local r,m=0,1
    //       while a>0 or b>0 do
    //         r=r+((a%2+b%2)%2)*m
    //         a,b,m=math.floor(a/2),math.floor(b/2),m*2
    //       end
    //       return r
    //     end
    //   Compact it into one line:

    var vR  = rv(4), vE = rv(4), vK2 = rv(4), vI = rv(4), vA = rv(4), vB2 = rv(4);
    var vXb = rv(4); // xor helper name

    var keyArr = key.map(function(k){ return obfNum(k); }).join(',');
    var encArr = enc.map(function(b){ return obfNum(b); }).join(',');

    // Compact XOR helper as single expression using iteration
    // xb function inlined as upvalue closure
    var lines = [
      '(function()',
      ' local '+vXb+'=function('+vA+','+vB2+') local r,m=0,1 while '+vA+'>0 or '+vB2+'>0 do r=r+(('+vA+'%2+'+vB2+'%2)%2)*m '+vA+'=math.floor('+vA+'/2) '+vB2+'=math.floor('+vB2+'/2) m=m*2 end return r end',
      ' local '+vK2+'={'+keyArr+'}',
      ' local '+vE+'={'+encArr+'}',
      ' local '+vR+'={}',
      ' for '+vI+'=1,#'+vE+' do '+vR+'['+vI+']=string.char('+vXb+'('+vE+'['+vI+'],'+vK2+'[(('+vI+'-1)%#'+vK2+')+1])) end',
      ' return table.concat('+vR+')',
      'end)()',
    ];
    return lines.join(' ');
  }

  code = code.replace(/"((?:[^"\\]|\\.)*)"/g, function(_, content) {
    var decoded = content
      .replace(/\\n/g,'\n').replace(/\\t/g,'\t')
      .replace(/\\r/g,'\r').replace(/\\\\/g,'\\').replace(/\\"/g,'"');
    return doEncode(decoded);
  });
  code = code.replace(/'((?:[^'\\]|\\.)*)'/g, function(_, content) {
    var decoded = content
      .replace(/\\n/g,'\n').replace(/\\t/g,'\t')
      .replace(/\\r/g,'\r').replace(/\\\\/g,'\\').replace(/\\'/g,"'");
    return doEncode(decoded);
  });
  return code;
}

// ── 2. Variable mangling ───────────────────────────────
function mangleNames(code) {
  var GLOBALS = {
    'print':1,'string':1,'table':1,'math':1,'os':1,'io':1,'debug':1,
    'require':1,'pcall':1,'xpcall':1,'tostring':1,'tonumber':1,'type':1,
    'pairs':1,'ipairs':1,'next':1,'load':1,'loadstring':1,'error':1,
    'assert':1,'select':1,'unpack':1,'rawget':1,'rawset':1,'rawlen':1,
    'setmetatable':1,'getmetatable':1,'coroutine':1,'bit':1,'bit32':1,
    'getfenv':1,'setfenv':1,'collectgarbage':1,'dofile':1,'loadfile':1,
    'rawequal':1,'warn':1,'_ENV':1,'_G':1,'_VERSION':1,'game':1,
    'workspace':1,'script':1,'wait':1,'task':1,'Instance':1,'Vector3':1,
    'CFrame':1,'Color3':1,'UDim2':1,'UDim':1,'Enum':1,'tick':1,'time':1,
    'typeof':1,'true':1,'false':1,'nil':1,'and':1,'or':1,'not':1,
    'if':1,'then':1,'else':1,'elseif':1,'end':1,'do':1,'while':1,
    'repeat':1,'until':1,'for':1,'in':1,'local':1,'return':1,'break':1,
    'function':1,'Player':1,'Players':1,'RunService':1,'UserInputService':1,
    'TweenService':1,'DataStoreService':1,'HttpService':1,'ReplicatedStorage':1,
    'ServerStorage':1,'ServerScriptService':1,'StarterGui':1,'StarterPack':1,
    'StarterPlayer':1,'Lighting':1,'SoundService':1,'Teams':1
  };
  var varMap = {};
  var declPattern = /\blocal\s+(?:function\s+)?([a-z_][a-z0-9_]*)/g;
  var m;
  while ((m = declPattern.exec(code)) !== null) {
    var name = m[1];
    if (!GLOBALS[name] && !varMap[name])
      varMap[name] = randVar(8);
  }
  for (var old in varMap) {
    code = code.replace(
      new RegExp('(?<![a-zA-Z0-9_])' + old + '(?![a-zA-Z0-9_])', 'g'),
      varMap[old]
    );
  }
  return code;
}

// ── 3. Number obfuscation ──────────────────────────────
function obfNums(code) {
  return code.replace(/(?<![.\w])(\b\d+\b)(?![.\w])/g, function(match, num) {
    var n = parseInt(num);
    if (isNaN(n) || n > 9999 || n < 0) return match;
    var junk = Math.floor(Math.random() * 500) + 1;
    return '(' + (n + junk) + '-' + junk + ')';
  });
}

// ── splitStatements ──────────────────────────────────
// Hanya dipakai untuk kode USER (sebelum obfuscation).
// Input: plain Lua code, multi-line.
// Output: array of top-level statement strings.
// Aturan sederhana: track depth dengan keyword opens/closes.
// TIDAK dipakai untuk output VM/CFF — lihat desain VM baru.
function splitStatements(code) {
  var lines = code.split('\n');
  var stmts = [], buf = [], depth = 0;

  function flush() {
    var s = buf.join('\n').trim();
    if (s) stmts.push(s);
    buf.length = 0;  // splice in-place — closure references same array
  }

  // Hitung delta depth dari satu baris Lua.
  // Hapus string literals dan komentar dulu.
  function delta(line) {
    var s = line
      .replace(/"(?:[^"\\]|\\.)*"/g, '""')
      .replace(/'(?:[^'\\]|\\.)*'/g, "''")
      .replace(/--.*$/, '');
    var d = 0, m;
    // +1: function, if, repeat (masing-masing buka satu block)
    var reOpen = /\b(function|if|repeat)\b/g;
    while ((m = reOpen.exec(s)) !== null) d++;
    // +1: for/while (do-nya tidak dihitung — for/while sudah include do)
    var reLoop = /\b(for|while)\b/g;
    while ((m = reLoop.exec(s)) !== null) d++;
    // +1: "do" HANYA jika standalone (tidak ada for/while di baris yang sama)
    if (!/\b(for|while)\b/.test(s)) {
      var reDo = /\bdo\b/g;
      while ((m = reDo.exec(s)) !== null) d++;
    }
    // -1: end, until
    var reClose = /\b(end|until)\b/g;
    while ((m = reClose.exec(s)) !== null) d--;
    return d;
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('--')) {
      // Blank/comment: flush pending buf only if we're at top level
      if (depth === 0 && buf.length > 0) flush();
      continue;
    }
    var d = delta(line);
    if (depth === 0 && d === 0 && buf.length === 0) {
      // Single-line statement that opens and closes no blocks: emit directly
      buf.push(line);
      flush();
    } else {
      buf.push(line);
      depth += d;
      if (depth <= 0) {
        depth = 0;
        flush();
      }
    }
  }
  if (buf.length > 0) flush();
  return stmts;
}

// ── 4. Junk code injection ────────────────────────────
// Terima array of statement strings, return array baru
// dengan junk disisipkan di antara statements.
// Junk = satu-liner valid Lua yang tidak ada efeknya.
function injectJunk(stmts) {
  var j = [
    function(){ return 'local ' + rv(4) + ' = ' + obfNum(Math.floor(Math.random()*999)+1); },
    function(){ return 'local ' + rv(4) + ' = type(nil)'; },
    function(){ return 'local ' + rv(4) + ' = math.max(' + obfNum(0) + ',' + obfNum(0) + ')'; },
    function(){ return 'local ' + rv(4) + ' = #' + encodeStr(''); },
    function(){ var a=rv(4),b=rv(4); return 'local '+a+' = '+obfNum(1)+' local '+b+' = '+a+' + '+obfNum(0); },
  ];
  var out = [];
  for (var i = 0; i < stmts.length; i++) {
    out.push(stmts[i]);
    if (Math.random() < 0.35)
      out.push(j[Math.floor(Math.random() * j.length)]());
  }
  return out;
}

// ── 5. Control Flow Flattening ────────────────────────
// Terima array of statement strings.
// Return: satu string Lua berupa while+if/elseif state machine.
// Setiap statement dijadikan satu case — body-nya diindent apa adanya.
// TIDAK perlu re-split output ini; langsung masuk ke VM sebagai satu blok.
function flattenControlFlow(stmts) {
  if (stmts.length === 0) return '';
  if (stmts.length === 1) return stmts[0];

  // Buat state value unik random untuk tiap statement
  var states = [], used = {};
  for (var i = 0; i < stmts.length; i++) {
    var v;
    do { v = Math.floor(Math.random() * 89999) + 10000; } while (used[v]);
    used[v] = true;
    states.push(v);
  }

  // Shuffle urutan emit (bukan urutan eksekusi — pointer tetap urut)
  var order = stmts.map(function(_, i) { return i; });
  for (var i = order.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
  }

  var vSt = rv(), vRun = rv();
  var lines = [];
  lines.push('local ' + vSt + ' = ' + obfNum(states[0]));
  lines.push('local ' + vRun + ' = true');
  lines.push('while ' + vRun + ' do');

  for (var e = 0; e < order.length; e++) {
    var idx = order[e];
    lines.push('  ' + (e === 0 ? 'if' : 'elseif') + ' ' + vSt + ' == ' + obfNum(states[idx]) + ' then');
    stmts[idx].split('\n').forEach(function(l) { lines.push('    ' + l); });
    lines.push('    ' + (idx + 1 < stmts.length
      ? vSt + ' = ' + obfNum(states[idx + 1])
      : vRun + ' = false'));
  }
  lines.push('  else');
  lines.push('    ' + vRun + ' = false');
  lines.push('  end');
  lines.push('end');
  return lines.join('\n');
}

// ── Anti-debug ────────────────────────────────────────
function buildAntiDebug(code) {
  var vT0=rv(),vT1=rv(),vPc=rv(),vHk=rv(),vDbg=rv(),vOk=rv(),vN=rv();
  var lines = [
    'do',
    '  local '+vOk+' = true',
    '  local '+vDbg+' = debug',
    '  if '+vDbg+' and '+vDbg+'.sethook then',
    '    local '+vHk+' = '+vDbg+'.getinfo and '+vDbg+'.getinfo(1)',
    '    if '+vHk+' and type('+vHk+'.source) == '+encodeStr('string')+' then',
    '      if '+vHk+'.source == '+encodeStr('')+' then '+vOk+' = false end',
    '    end',
    '  end',
    '  if os and os.clock then',
    '    local '+vT0+' = os.clock()',
    '    local '+vN+' = 0',
    '    for _i = 1, '+obfNum(1000)+' do '+vN+' = '+vN+' + _i end',
    '    local '+vT1+' = os.clock()',
    '    if '+vT1+' - '+vT0+' > '+obfNum(1)+' then '+vOk+' = false end',
    '  end',
    '  local '+vPc+' = pcall',
    '  if type('+vPc+') ~= '+encodeStr('function')+' then '+vOk+' = false end',
    '  if not '+vOk+' then error('+encodeStr('SOLI: debug detected')+',0) end',
    'end',
  ];
  return lines.join('\n') + '\n' + code;
}

// ── Anti-Tamper: executor ────────────────────────────
function buildAntiTamper(code) {
  var vOk=rv(),vDbg=rv(),vInfo=rv(),vSrc=rv(),vFlag=rv(),vCheck=rv();
  var lines = [
    'local '+vFlag+' = false',
    'local '+vCheck+' = function()',
    '  if '+vFlag+' then error('+encodeStr('SOLI: already executed')+',0) end',
    '  '+vFlag+' = true',
    '  local '+vOk+' = true',
    '  local '+vDbg+' = debug',
    '  if '+vDbg+' and '+vDbg+'.getinfo then',
    '    local '+vInfo+' = '+vDbg+'.getinfo(2)',
    '    if '+vInfo+' then',
    '      local '+vSrc+' = tostring('+vInfo+'.source)',
    '      if '+vSrc+' == '+encodeStr('=[C]')+' then '+vOk+' = false end',
    '    end',
    '  end',
    '  if not '+vOk+' then error('+encodeStr('SOLI: tamper detected')+',0) end',
    'end',
    vCheck+'()',
  ];
  return lines.join('\n') + '\n' + code;
}

// ── Anti-Tamper: Lua biasa ───────────────────────────
function buildLuaAntiTamper(code) {
  var vTs=rv(),vTp=rv(),vRef=rv(),vVer=rv(),vFlag=rv(),vCheck=rv();
  var lines = [
    'local '+vFlag+' = false',
    'local '+vCheck+' = function()',
    '  if '+vFlag+' then error('+encodeStr('SOLI: already executed')+',0) end',
    '  '+vFlag+' = true',
    '  local '+vTs+' = tostring',
    '  local '+vTp+' = type',
    '  if '+vTp+'(math) ~= '+encodeStr('table')+' then error('+encodeStr('SOLI: env corrupted')+',0) end',
    '  local '+vVer+' = _VERSION or '+encodeStr(''),
    '  if not string.find('+vVer+','+encodeStr('Lua')+',1,true) then error('+encodeStr('SOLI: invalid runtime')+',0) end',
    '  local '+vRef+' = '+vTs+'(math.sin)',
    '  if not string.find('+vRef+','+encodeStr('function')+',1,true) then error('+encodeStr('SOLI: hook detected')+',0) end',
    'end',
    vCheck+'()',
  ];
  return lines.join('\n') + '\n' + code;
}

// ── VM Layer ──────────────────────────────────────────
// Desain baru: TIDAK split output jadi per-statement.
// Seluruh kode (string) dibungkus dalam SATU closure.
// VM hanya punya 1 "instruction": panggil closure itu.
// Layer 2 wrap layer 1 dengan cara yang sama.
// Opcode random per-compile.
//
// Kenapa ini benar:
//   - Tidak ada risiko salah potong multi-line blocks
//   - CFF & junk sudah diapply SEBELUM masuk VM
//   - Output layer 1 adalah Lua valid yang bisa dibungkus langsung
function buildOneVM(innerCode) {
  function randOp() { return Math.floor(Math.random() * 60000) + 1000; }
  var OP_EXEC = randOp(), OP_HALT;
  do { OP_HALT = randOp(); } while (OP_HALT === OP_EXEC);

  var vK  = rv(), vBc = rv(), vPc = rv();
  var vIn = rv(), vOp = rv(), vIx = rv();
  // Satu slot key untuk satu-satunya closure
  var slotKey = Math.floor(Math.random() * 89999) + 10000;

  var lines = [];
  // Closure table dengan satu entry
  lines.push('local ' + vK + ' = {}');
  lines.push(vK + '[' + obfNum(slotKey) + '] = function()');
  innerCode.split('\n').forEach(function(l) { lines.push('  ' + l); });
  lines.push('end');
  // Bytecode: EXEC → slot, HALT
  lines.push('local ' + vBc + ' = {');
  lines.push('  {' + obfNum(OP_EXEC) + ', ' + obfNum(slotKey) + '},');
  lines.push('  {' + obfNum(OP_HALT) + ', ' + obfNum(0) + '},');
  lines.push('}');
  // Dispatch loop
  var opLit = obfNum(OP_EXEC);
  lines.push('local ' + vPc + ' = ' + obfNum(1));
  lines.push('while ' + vPc + ' <= #' + vBc + ' do');
  lines.push('  local ' + vIn + ' = ' + vBc + '[' + vPc + ']');
  lines.push('  local ' + vOp + ' = ' + vIn + '[' + obfNum(1) + ']');
  lines.push('  local ' + vIx + ' = ' + vIn + '[' + obfNum(2) + ']');
  lines.push('  if ' + vOp + ' == ' + opLit + ' then ' + vK + '[' + vIx + ']()');
  lines.push('  else break end');
  lines.push('  ' + vPc + ' = ' + vPc + ' + ' + obfNum(1));
  lines.push('end');
  return lines.join('\n');
}

// ── Main obfuscation pipeline ─────────────────────────
function buildVMLayer(code) {
  // 1. Transform: mangle vars, XOR-encode strings, obfuscate numbers
  var out = mangleNames(code);
  out = encodeStrings(out);
  out = obfNums(out);

  // 2. Split ke statements (kode user masih sederhana di sini)
  var stmts = splitStatements(out);

  // 3. Junk injection (antar statements)
  stmts = injectJunk(stmts);

  // 4. Control flow flatten → satu string Lua
  var cff = flattenControlFlow(stmts);

  // 5. VM Layer 1: wrap cff dalam satu closure + dispatch
  var vm1 = buildOneVM(cff);

  // 6. VM Layer 2: wrap vm1 dalam closure + dispatch lagi
  var vm2 = buildOneVM(vm1);

  // Header junk vars
  var jA = rv(), jB = rv();
  return '-- SOLI Obfuscator [VM\xd72 | XOR-Rolling | CFF | Junk]\n'
    + 'local ' + jA + ' = ' + obfNum(Math.floor(Math.random() * 999) + 1) + '\n'
    + 'local ' + jB + ' = ' + jA + ' * ' + obfNum(2) + '\n'
    + vm2 + '\n';
}

// ═══════════════════════════════════════════════════════
//  AUTO LOWERCASE — skip isi string literal & komentar
// ═══════════════════════════════════════════════════════
function autoLowercase(code) {
  var result = '';
  var i = 0;
  while (i < code.length) {
    var ch = code[i];
    // Skip string double quote
    if (ch === '"') {
      result += ch; i++;
      while (i < code.length) {
        var c = code[i];
        result += c; i++;
        if (c === '\\') { if (i < code.length) { result += code[i]; i++; } }
        else if (c === '"') break;
      }
    }
    // Skip string single quote
    else if (ch === "'") {
      result += ch; i++;
      while (i < code.length) {
        var c = code[i];
        result += c; i++;
        if (c === '\\') { if (i < code.length) { result += code[i]; i++; } }
        else if (c === "'") break;
      }
    }
    // Skip long string [[...]]
    else if (ch === '[' && code[i+1] === '[') {
      result += '[['; i += 2;
      while (i < code.length) {
        if (code[i] === ']' && code[i+1] === ']') { result += ']]'; i += 2; break; }
        result += code[i]; i++;
      }
    }
    // Skip line comment --
    else if (ch === '-' && code[i+1] === '-') {
      while (i < code.length && code[i] !== '\n') { result += code[i]; i++; }
    }
    // Normal code — lowercase
    else {
      result += ch.toLowerCase(); i++;
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════
//  MAIN OBFUSCATE
// ═══════════════════════════════════════════════════════
async function doObf() {
  var inputEl  = document.getElementById('input');
  var outputEl = document.getElementById('output');
  var btn      = document.getElementById('obfBtn');
  var useAntiTamper    = document.getElementById('useAntiTamper').checked;
  var useLuaAntiTamper = document.getElementById('useLuaAntiTamper').checked;

  var code = inputEl.value.trim();
  var layers = 0;

  btn.disabled = true;
  outputEl.value = '';
  setStatus('Processing...', 'process');
  setLayers(0);

  await new Promise(r => setTimeout(r, 400));

  if (!code) {
    setStatus('Input kosong! Paste kode Lua dulu.', 'error');
    btn.disabled = false; return;
  }
  // Auto lowercase: jaga string literals tetap, lowercase identifier aja
  code = autoLowercase(code);
  inputEl.value = code;
  if (!looksLikeLua(code)) {
    setStatus('Kode tidak terdeteksi sebagai Lua. Cek input kamu.', 'error');
    btn.disabled = false; return;
  }

  try {
    // Pipeline wajib: mangle+XOR rolling+obfNums+junk+flatten+VM x2+opcode random+antiDebug
    var block = buildVMLayer(code);
    block = buildAntiDebug(block);
    var layers = 9; // mangle+XOR-rolling+obfNums+junk+flatten+VM1+VM2+opcodeRandom+antiDebug

    // Anti-Tamper — pilihan user
    if (useAntiTamper) {
      block = buildAntiTamper(block);
      layers += 1;
    }
    if (useLuaAntiTamper) {
      block = buildLuaAntiTamper(block);
      layers += 1;
    }

    setLayers(layers);
    outputEl.value = block;
    setStatus('Selesai! ' + layers + ' layer', 'done');
    setLayers(layers);

  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
//  COPY
// ═══════════════════════════════════════════════════════
async function doCopy() {
  var out = document.getElementById('output').value;
  if (!out.trim()) { setStatus('Belum ada output untuk dicopy!', 'error'); return; }

  try {
    await navigator.clipboard.writeText(out);
  } catch(e) {
    var ta = document.createElement('textarea');
    ta.value = out;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  var btn = document.querySelector('.btn-secondary');
  var orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.style.color = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  setTimeout(function() {
    btn.textContent = orig;
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 1500);
  setStatus('Output berhasil dicopy ke clipboard!', 'done');
}
